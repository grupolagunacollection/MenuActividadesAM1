<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LANZA — Assets & Properties</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600&family=Montserrat:wght@200;300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A96E;
    --black: #0D0D0D;
    --olive: #1C3A30;
    --navy: #142040;
    --cream: #FAF7F2;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Montserrat', sans-serif;
  }

  body { font-family: var(--sans); background: #111; color: white; overflow-x: hidden; }

  /* LOGO SVG STYLE */
  .logo-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .logo-svg { width: 300px; height: auto; }
  .logo-svg path { fill: var(--gold); }
  .logo-subtext { 
    font-size: 11px; 
    letter-spacing: 0.5em; 
    color: var(--gold); 
    text-transform: uppercase; 
    font-weight: 300;
  }

  /* NAVIGATION */
  .nav { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(13,13,13,0.95); border-bottom: 0.5px solid rgba(201,169,110,0.2); }
  .nav-brand { font-size: 12px; letter-spacing: 0.1em; color: var(--gold); text-transform: uppercase; }

  /* PAGES */
  .pages { padding-top: 61px; }
  .page { display: none; min-height: calc(100vh - 61px); position: relative; padding: 80px 60px; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
  .page.visible { display: flex; }

  /* BACKGROUNDS */
  .p-black { background: var(--black); }
  .p-olive { background: var(--olive); }
  .p-navy { background: var(--navy); }
  .p-cream { background: var(--cream); color: var(--black); }

  /* MOCKUP IMAGES */
  .mockup-img { max-width: 85%; max-height: 70vh; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }

  /* CONTROLS */
  .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
  .btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 0.2em; transition: 0.3s; }
  .btn:hover { background: var(--gold); color: white; }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">LANZA — ASSETS & PROPERTIES</div>
  <div id="counter" style="font-size: 10px; opacity: 0.5;">01 / 05</div>
</nav>

<div class="pages">
  <div class="page p-black visible">
    <div class="logo-wrapper">
      <svg class="logo-svg" viewBox="0 0 400 100">
        <path d="M40,30 L45,30 L45,65 L70,65 L70,70 L40,70 Z"/>
        <path d="M95,70 L115,30 L135,70 L130,70 L127,65 L103,65 L100,70 Z M115,42 L108,58 L115,50 L122,58 Z"/>
        <path d="M160,70 L160,30 L165,30 L195,62 L195,30 L200,30 L200,70 L195,70 L165,38 L165,70 Z"/>
        <path d="M225,35 L225,30 L265,30 L265,35 L235,65 L265,65 L265,70 L225,70 L225,65 L255,35 Z"/>
        <path d="M290,70 L310,30 L330,70 L325,70 L322,65 L298,65 L295,70 Z M310,42 L303,58 L310,50 L317,58 Z"/>
      </svg>
      <div class="logo-subtext">ASSETS & PROPERTIES</div>
    </div>
  </div>

  <div class="page p-navy">
    <h2 style="margin-bottom: 20px; font-family: var(--serif); color: var(--gold); font-weight: 300;">Puntos de Contacto</h2>
    <img src="image_6c49a1.jpg" class="mockup-img" alt="Si no ves la imagen, asegúrate de que image_6c49a1.jpg esté en la misma carpeta">
  </div>

  <div class="page p-olive">
    <h2 style="margin-bottom: 20px; font-family: var(--serif); color: var(--gold); font-weight: 300;">Sistema de Papelería</h2>
    <img src="image_6c49bf.jpg" class="mockup-img" alt="Mockup Papelería">
  </div>

  <div class="page p-cream">
    <h2 style="margin-bottom: 20px; font-family: var(--serif); font-weight: 300;">Aplicación Digital</h2>
    <img src="image_6c4c6c.jpg" class="mockup-img" alt="Mockup Digital">
  </div>

  <div class="page p-black">
    <div class="logo-wrapper" style="transform: scale(0.7);">
        <svg class="logo-svg" viewBox="0 0 400 100">
            <path d="M40,30 L45,30 L45,65 L70,65 L70,70 L40,70 Z"/>
            <path d="M95,70 L115,30 L135,70 L130,70 L127,65 L103,65 L100,70 Z M115,42 L108,58 L115,50 L122,58 Z"/>
            <path d="M160,70 L160,30 L165,30 L195,62 L195,30 L200,30 L200,70 L195,70 L165,38 L165,70 Z"/>
            <path d="M225,35 L225,30 L265,30 L265,35 L235,65 L265,65 L265,70 L225,70 L225,65 L255,35 Z"/>
            <path d="M290,70 L310,30 L330,70 L325,70 L322,65 L298,65 L295,70 Z M310,42 L303,58 L310,50 L317,58 Z"/>
        </svg>
        <div class="logo-subtext">ASSETS & PROPERTIES</div>
    </div>
    <p style="margin-top: 40px; font-style: italic; opacity: 0.7;">Calidad. Confianza. Resultados.</p>
  </div>
</div>

<div class="controls">
  <button class="btn" onclick="changePage(-1)">Anterior</button>
  <button class="btn" onclick="changePage(1)">Siguiente</button>
</div>

<script>
  let current = 0;
  const pages = document.querySelectorAll('.page');
  const counter = document.getElementById('counter');

  function changePage(dir) {
    pages[current].classList.remove('visible');
    current = (current + dir + pages.length) % pages.length;
    pages[current].classList.add('visible');
    counter.innerText = `${String(current + 1).padStart(2, '0')} / ${String(pages.length).padStart(2, '0')}`;
  }

  document.addEventListener('keydown', (e) => {
    if(e.key === "ArrowRight") changePage(1);
    if(e.key === "ArrowLeft") changePage(-1);
  });
</script>

</body>
</html>
